<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard App Download</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        .btn { background: #007bff; color: white; padding: 15px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 20px; }
        .warning { color: #d9534f; font-size: 0.9em; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>
    <div class="card">
        <h2>単語帳アプリ (Android版)</h2>
        <p>最新のAPKファイルをダウンロードしてインストールしてください。</p>
        
        <!-- APKへのリンク -->
        <a href="flashcard-app.apk" class="btn">アプリをダウンロード</a>

        <div class="warning">
            <p><strong>【インストール時の注意】</strong></p>
            <ul>
                <li>「有害なファイルの可能性があります」と出ますが、「続行」を押してください。</li>
                <li>ブラウザの「不明なアプリのインストール」を許可する必要があります。</li>
                <li>Playプロテクトの警告が出た場合は「詳細」→「インストールする」を選択してください。</li>
            </ul>
        </div>
    </div>
</body>
</html>
